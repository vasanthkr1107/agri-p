<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Crop Advisory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary': '#10b981', // Emerald super vibrant
              'primary-dark': '#047857',
              'primary-light': '#34d399',
              'gold': '#f59e0b',
              'fire': '#ef4444',
              'sky': '#06b6d4',
              'leaf': '#22c55e',
              'sun': '#eab308',
            },
            animation: {
              'bounce-slow': 'bounce 2s infinite',
              'pulse-glow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-leaf': 'spin 3s linear infinite',
              'explode': 'explode 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
              'float': 'float 6s ease-in-out infinite',
            },
            backgroundImage: {
              'gradient-hero': 'linear-gradient(135deg, #10b981 0%, #f59e0b 50%, #ef4444 100%)',
              'farm-bg': 'radial-gradient(circle at 20% 80%, #34d399 0%, #10b981 50%, #065f46 100%)',
            },
            boxShadow: {
              'glow-primary': '0 0 20px rgba(16, 185, 129, 0.5)',
              'glow-gold': '0 0 25px rgba(245, 158, 11, 0.6)',
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
